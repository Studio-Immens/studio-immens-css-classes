name: Deploy to WordPress.org
on:
  push:
    tags:
      - '*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        # La v4.2.2 è quella che risolve i problemi di compatibilità Node 20/24
        uses: actions/checkout@v4.2.2

      - name: WordPress.org Deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SLUG: studio-immens-css-classes # <--- RICONTROLLA QUESTO
          # Aggiungiamo il flag di debug per vedere dove urta
          VERBOSE: true 
